<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced JD Generator Pro</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-gray: #f3f4f6;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Form */
        .sidebar {
            width: 450px;
            background: white;
            padding: 25px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 10;
        }

        h2, h3 { color: #1f2937; margin-top: 0; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        
        .form-group { margin-bottom: 18px; }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #4b5563;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .heading-edit {
            background: #f9fafb;
            font-weight: bold;
            margin-bottom: 5px;
            border-style: dashed;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-add { background: #f3f4f6; color: #374151; border: 1px dashed #9ca3af; }
        .btn-add:hover { background: #e5e7eb; }
        .btn-delete { background: #fee2e2; color: #dc2626; width: auto; padding: 5px 10px; font-size: 12px; }

        /* Preview Area */
        .preview-container {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            background: #e5e7eb;
        }

        .jd-paper {
            width: 100%;
            max-width: 850px;
            background: white;
            min-height: 1100px;
            padding: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-top: 12px solid var(--primary-color);
            position: relative;
        }

        /* JD Layout Elements */
        .jd-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .logo-preview { max-width: 150px; max-height: 80px; object-fit: contain; margin-bottom: 15px; display: none; }
        
        .job-title { font-size: 2.8em; color: var(--primary-color); margin: 5px 0; font-weight: 800; line-height: 1.1; }
        .company-name { font-size: 1.3em; color: #6b7280; font-weight: 500; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .tag { background: #eff6ff; color: var(--primary-color); padding: 6px 14px; border-radius: 4px; font-size: 0.85em; font-weight: 600; border: 1px solid #dbeafe; }
        
        .section-title { 
            color: var(--primary-color); 
            border-bottom: 2px solid #f3f4f6; 
            padding-bottom: 8px; 
            margin-top: 35px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1em;
        }
        
        .content { line-height: 1.7; color: #374151; font-size: 1.05em; white-space: pre-wrap; }
        .content ul { padding-left: 20px; }
        
        .incentive-box { 
            background: #f8fafc; 
            padding: 20px; 
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            margin-top: 30px;
        }

        .dynamic-section-sidebar {
            border: 1px solid #e5e7eb;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
        }

        @media print {
            .sidebar { display: none; }
            .preview-container { padding: 0; background: white; }
            .jd-paper { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>JD Master</h2>
    
    <div class="form-group">
        <label>Theme Color</label>
        <input type="color" id="themeColor" value="#2563eb" onchange="updateStyles()">
    </div>

    <div class="form-group">
        <label>Company Logo</label>
        <input type="file" id="logoInput" accept="image/*" onchange="handleLogo(this)">
    </div>

    <div class="form-group">
        <label>Organization & Role</label>
        <input type="text" id="orgName" placeholder="Organization Name" oninput="updatePreview()">
        <input type="text" id="roleTitle" placeholder="Job Title (e.g. Lead Designer)" style="margin-top:8px" oninput="updatePreview()">
    </div>

    <div class="form-group">
        <label>Metadata</label>
        <select id="roleType" onchange="updatePreview()">
            <option value="Full Time">Full Time</option>
            <option value="Internship">Internship</option>
            <option value="Apprenticeship">Apprenticeship</option>
            <option value="Full Time">Articleship</option>
            <option value="Volunteering">Volunteering</option>
        </select>
        <select id="nature" onchange="toggleLocation()" style="margin-top:8px">
            <option value="In-Office">In-Office</option>
            <option value="Hybrid">Hybrid</option>
            <option value="Work from Home">Work from Home</option>
        </select>
        <input type="text" id="location" placeholder="City, Country" style="margin-top:8px" oninput="updatePreview()">
    </div>

    <hr>
    
    <h3>Sections</h3>
    <div id="dynamicSectionsContainer">
        <div class="dynamic-section-sidebar">
            <input type="text" class="heading-edit" value="About the Role" oninput="updatePreview()">
            <textarea placeholder="Tell them about the mission..." rows="3" oninput="updatePreview()"></textarea>
        </div>

        <div class="dynamic-section-sidebar">
            <input type="text" class="heading-edit" value="Key Responsibilities" oninput="updatePreview()">
            <textarea placeholder="List core tasks (use bullet points)..." rows="3" oninput="updatePreview()"></textarea>
        </div>
    </div>

    <button class="btn btn-add" onclick="addNewSection()">+ Add Custom Section</button>

    <hr>

    <div class="form-group">
        <label>Incentives & Pay</label>
        <input type="text" id="stipend" placeholder="Stipend (e.g. ₹20,000/mo)" oninput="updatePreview()">
        <input type="text" id="ctc" placeholder="Annual CTC (e.g. 12 LPA)" style="margin-top:8px" oninput="updatePreview()">
    </div>

    <button class="btn btn-primary" onclick="window.print()">Export to PDF</button>
</div>

<div class="preview-container">
    <div class="jd-paper" id="jdContent">
        <div class="jd-header">
            <div style="max-width: 70%;">
                <div class="company-name" id="pOrgName">ORGANIZATION</div>
                <h1 class="job-title" id="pTitle">Role Title</h1>
                <div class="tag-container" id="pTags"></div>
            </div>
            <img id="pLogo" class="logo-preview" src="" alt="logo">
        </div>

        <div id="pDynamicContent">
            </div>

        <div class="incentive-box" id="pIncentiveBox" style="display: none;">
            <strong id="pIncHeading" style="color: var(--primary-color)">COMPENSATION & BENEFITS</strong>
            <p class="content" id="pIncentiveText" style="margin-top:10px;"></p>
        </div>
    </div>
</div>

<script>
    function updateStyles() {
        const color = document.getElementById('themeColor').value;
        document.documentElement.style.setProperty('--primary-color', color);
    }

    function handleLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('pLogo');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toggleLocation() {
        const nature = document.getElementById('nature').value;
        const loc = document.getElementById('location');
        loc.style.display = (nature === 'Work from Home') ? 'none' : 'block';
        updatePreview();
    }

    function addNewSection() {
        const container = document.getElementById('dynamicSectionsContainer');
        const div = document.createElement('div');
        div.className = 'dynamic-section-sidebar';
        div.innerHTML = `
            <button class="btn btn-delete" onclick="this.parentElement.remove(); updatePreview();" style="position:absolute; right:10px; top:10px;">Remove</button>
            <input type="text" class="heading-edit" value="New Section" oninput="updatePreview()">
            <textarea placeholder="Enter content here..." rows="3" oninput="updatePreview()"></textarea>
        `;
        container.appendChild(div);
        updatePreview();
    }

    function updatePreview() {
        // Header Info
        document.getElementById('pOrgName').innerText = document.getElementById('orgName').value || "ORGANIZATION";
        document.getElementById('pTitle').innerText = document.getElementById('roleTitle').value || "Job Role Title";

        // Tags
        const tags = [
            document.getElementById('roleType').value,
            document.getElementById('nature').value
        ];
        if(document.getElementById('nature').value !== 'Work from Home') {
            tags.push(document.getElementById('location').value);
        }
        
        const tagContainer = document.getElementById('pTags');
        tagContainer.innerHTML = '';
        tags.filter(t => t).forEach(t => {
            const span = document.createElement('span');
            span.className = 'tag';
            span.innerText = t;
            tagContainer.appendChild(span);
        });

        // Dynamic Sections
        const pContent = document.getElementById('pDynamicContent');
        pContent.innerHTML = '';
        const sections = document.querySelectorAll('.dynamic-section-sidebar');
        
        sections.forEach(sec => {
            const heading = sec.querySelector('input').value;
            const text = sec.querySelector('textarea').value;
            
            if(heading || text) {
                const sectionWrap = document.createElement('div');
                sectionWrap.innerHTML = `
                    <h3 class="section-title">${heading}</h3>
                    <div class="content">${text}</div>
                `;
                pContent.appendChild(sectionWrap);
            }
        });

        // Incentives
        const stipend = document.getElementById('stipend').value;
        const ctc = document.getElementById('ctc').value;
        const incBox = document.getElementById('pIncentiveBox');
        const incText = document.getElementById('pIncentiveText');

        if(stipend || ctc) {
            incBox.style.display = 'block';
            let html = '';
            if(stipend) html += `• <strong>Stipend:</strong> ${stipend}<br>`;
            if(ctc) html += `• <strong>CTC:</strong> ${ctc}`;
            incText.innerHTML = html;
        } else {
            incBox.style.display = 'none';
        }
    }

    // Initialize
    updatePreview();
</script>

</body>
</html>
