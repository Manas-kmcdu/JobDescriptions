<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional JD Generator Tool</title>
    <style>
        :root { --primary: #002060; --gray: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: #e2e8f0; height: 100vh; overflow: hidden; }
        .sidebar { width: 450px; background: white; padding: 25px; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 10; }
        .preview { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; position: relative; }
        .paper { width: 100%; max-width: 800px; background: white; padding: 60px; height: auto; min-height: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 12px; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .section-input { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .tag { background: #eef2ff; color: var(--primary); padding: 5px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-right: 5px; }
        .jd-section-h { color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .inc-box { background: #f8fafc; padding: 20px; border-left: 5px solid var(--primary); margin-top: 30px; }
        #pLogo { max-height: 80px; max-width: 150px; display: none; margin-bottom: 20px; }
        @media print { .sidebar { display: none; } .preview { background: white; padding: 0; } .paper { box-shadow: none; border: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>JD Builder</h2>
        <div class="form-group"><label>Logo</label><input type="file" accept="image/*" onchange="readLogo(this)"></div>
        <div class="form-group"><label>Theme Color</label><input type="color" id="color" value="#002060" oninput="sync()"></div>
        <div class="form-group"><label>Organization</label><input type="text" id="org" placeholder="Acme Corp" oninput="sync()"></div>
        <div class="form-group"><label>Role Title</label><input type="text" id="role" placeholder="Senior Analyst" oninput="sync()"></div>
        <div class="form-group"><label>Role Type</label><select id="type" onchange="sync()"><option>Full Time</option><option>Internship</option><option>Apprenticeship</option><option>Fellowship</option><option>Articleship</option><option>Volunteering</option></select></div>
        <div class="form-group"><label>Nature</label><select id="nature" onchange="sync()"><option>In-Office</option><option>Hybrid</option><option>Work from Home</option></select></div>
        <div class="form-group"><label>Location</label><input type="text" id="loc" placeholder="New York, NY" oninput="sync()"></div>
        
        <hr><label>Pre-Incentive Sections</label>
        <div id="topSections"></div>
        <button class="btn" style="background:#64748b; font-size:12px;" onclick="addSec('topSections')">+ Add Section</button>
        
        <hr><div class="form-group"><label>Incentives</label><input type="text" id="stipend" placeholder="Stipend: ₹50,000/mo" oninput="sync()"><input type="text" id="ctc" placeholder="CTC: 12 LPA" style="margin-top:5px" oninput="sync()"></div>
        
        <hr><label>Post-Incentive Sections</label>
        <div id="botSections"></div>
        <button class="btn" style="background:#64748b; font-size:12px;" onclick="addSec('botSections')">+ Add Section</button>
        
        <button class="btn" style="margin-top:30px; background:#10b981;" onclick="window.print()">Export to PDF</button>
    </div>

    <div class="preview">
        <div class="paper">
            <img id="pLogo">
            <div id="pOrg" style="font-size: 20px; color: #666; font-weight: 500;">ORGANIZATION</div>
            <h1 id="pTitle" style="font-size: 48px; margin: 5px 0;">Role Title</h1>
            <div id="pMeta" style="margin-top:15px;"></div>
            <div id="pTop"></div>
            <div id="pInc" class="inc-box" style="display:none"><strong>Incentives & Compensation</strong><p id="pIncText" style="white-space:pre-wrap;"></p></div>
            <div id="pBot"></div>
        </div>
    </div>

    <script>
        function sync() {
            const col = document.getElementById('color').value;
            document.documentElement.style.setProperty('--primary', col);
            document.getElementById('pOrg').innerText = document.getElementById('org').value || 'ORGANIZATION';
            document.getElementById('pTitle').innerText = document.getElementById('role').value || 'Role Title';
            document.getElementById('pTitle').style.color = col;
            
            const meta = [document.getElementById('type').value, document.getElementById('nature').value, document.getElementById('loc').value].filter(t => t);
            document.getElementById('pMeta').innerHTML = meta.map(m => `<span class="tag" style="background:${col}15; color:${col}">${m}</span>`).join('');
            
            renderDynamic('topSections', 'pTop');
            renderDynamic('botSections', 'pBot');
            
            const stip = document.getElementById('stipend').value; const ctc = document.getElementById('ctc').value;
            document.getElementById('pInc').style.display = (stip || ctc) ? 'block' : 'none';
            document.getElementById('pIncText').innerText = [stip, ctc].filter(v => v).join('\n');
        }

        function addSec(id) {
            const div = document.createElement('div'); div.className = 'section-input';
            div.innerHTML = `<input type="text" placeholder="Heading" class="h-in" oninput="sync()" value="Section Heading" style="font-weight:bold; margin-bottom:5px;"><textarea placeholder="Content..." class="t-in" oninput="sync()" rows="3"></textarea><button onclick="this.parentElement.remove();sync()" style="position:absolute; right:5px; top:5px; background:none; border:none; color:red; cursor:pointer;">&times;</button>`;
            document.getElementById(id).appendChild(div); sync();
        }

        function renderDynamic(srcId, destId) {
            const items = document.querySelectorAll(`#${srcId} .section-input`);
            document.getElementById(destId).innerHTML = Array.from(items).map(i => `<h3 class="jd-section-h">${i.querySelector('.h-in').value}</h3><p style="white-space:pre-wrap; line-height:1.6; color:#444;">${i.querySelector('.t-in').value}</p>`).join('');
        }

        function readLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { const img = document.getElementById('pLogo'); img.src = e.target.result; img.style.display = 'block'; };
                reader.readAsDataURL(input.files[0]);
            }
        }
        sync();
    </script>
</body>
</html>
